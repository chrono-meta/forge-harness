name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for internal vocabulary residue
        run: |
          echo "=== Scanning for internal vocabulary (fh-meta, fh-commons, [redacted-org], [redacted-system]) ==="
          FOUND=$(grep -r \
            -e "fh-meta" -e "fh-commons" \
            -e "[redacted-org]" -e "[redacted-system]" \
            --include="*.md" --include="*.json" --include="*.zsh" --include="*.sh" \
            --exclude-dir=".git" \
            . 2>/dev/null | grep -v "^Binary" || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: Internal vocabulary found:"
            echo "$FOUND"
            exit 1
          fi
          echo "PASS: No internal vocabulary found"

      - name: Validate plugin.json required fields
        run: |
          echo "=== Validating plugin.json files ==="
          python3 .github/scripts/validate_plugins.py

      - name: Validate marketplace.json structure
        run: |
          echo "=== Validating marketplace.json ==="
          python3 .github/scripts/validate_marketplace.py

      - name: Check skill count consistency
        run: |
          echo "=== Checking skill counts ==="
          FH_META_SKILLS=$(find plugins/fh-meta/skills -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          FH_META_AGENTS=$(find plugins/fh-meta/agents -mindepth 1 -maxdepth 1 -type f -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          FH_COMMONS_SKILLS=$(find plugins/fh-commons/skills -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          FH_COMMONS_AGENTS=$(find plugins/fh-commons/agents -mindepth 1 -maxdepth 1 -type f -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          echo "fh-meta: ${FH_META_SKILLS} skills, ${FH_META_AGENTS} agents"
          echo "fh-commons: ${FH_COMMONS_SKILLS} skills, ${FH_COMMONS_AGENTS} agents"

          DESCRIPTION=$(python3 -c "import json; p=json.load(open('plugins/fh-meta/.claude-plugin/plugin.json')); print(p['description'])")
          echo "fh-meta description: $DESCRIPTION"

          # Verify counts appear in description
          if ! echo "$DESCRIPTION" | grep -q "${FH_META_SKILLS} skills"; then
            echo "WARN: fh-meta description skill count may not match filesystem (${FH_META_SKILLS} skills on disk)"
          fi
          echo "PASS: skill count check complete"
